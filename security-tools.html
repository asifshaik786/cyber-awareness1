<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOC Command Center</title>

<style>
body {
  margin: 0;
  background: #05070f;
  color: #e5e7eb;
  font-family: monospace;
  overflow: hidden;
}

/* GRID LAYOUT */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 15px;
}

/* PANEL */
.panel {
  background: rgba(15, 23, 42, 0.7);
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 12px;
  padding: 12px;
}

/* INPUT */
input {
  width: 100%;
  padding: 8px;
  background: #0b1220;
  border: 1px solid #1f2937;
  color: white;
}

/* ENTROPY BAR */
.bar {
  height: 10px;
  background: #111827;
  margin-top: 8px;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  transition: 0.4s;
}

/* LOG AREA */
.log {
  height: 180px;
  overflow-y: auto;
  font-size: 12px;
}

/* NODE NETWORK */
.network {
  position: relative;
  height: 300px;
  background: radial-gradient(circle, #0b1220, #05070f);
  overflow: hidden;
}

.node {
  width: 10px;
  height: 10px;
  background: #38bdf8;
  border-radius: 50%;
  position: absolute;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.8); opacity: 0.4; }
  100% { transform: scale(1); opacity: 1; }
}

/* ATTACK LINE */
.line {
  position: absolute;
  height: 2px;
  background: red;
  opacity: 0.6;
  animation: move 2s linear infinite;
}

@keyframes move {
  from { transform: translateX(0); }
  to { transform: translateX(200px); }
}

/* HEADER */
header {
  text-align: center;
  padding: 10px;
  font-size: 18px;
  color: #38bdf8;
}
</style>
</head>

<body>

<header>🛡 SOC COMMAND CENTER - LIVE SECURITY GRID</header>

<div class="container">

<!-- LEFT PANEL -->
<div class="panel">
  🔐 PASSWORD ENGINE
  <input id="pwd" type="password" oninput="entropy()">

  <div class="bar">
    <div id="fill" class="fill"></div>
  </div>

  <div id="risk">Status: IDLE</div>
</div>

<!-- RIGHT PANEL -->
<div class="panel">
  ⚠ THREAT LOG STREAM
  <div class="log" id="log"></div>
</div>

<!-- NETWORK VISUAL -->
<div class="panel network" id="network">
</div>

</div>

<script>

/* PASSWORD ENGINE */
function entropy() {
  const p = document.getElementById("pwd").value;
  const fill = document.getElementById("fill");
  const risk = document.getElementById("risk");

  let s = 0;
  if (p.length > 4) s += 20;
  if (p.length > 8) s += 20;
  if (/[A-Z]/.test(p)) s += 20;
  if (/[0-9]/.test(p)) s += 20;
  if (/[^A-Za-z0-9]/.test(p)) s += 20;

  fill.style.width = s + "%";

  if (s < 40) {
    fill.style.background = "red";
    risk.innerText = "🔴 HIGH RISK";
    triggerAlert("Weak credential detected");
  } else if (s < 80) {
    fill.style.background = "orange";
    risk.innerText = "🟡 MEDIUM RISK";
  } else {
    fill.style.background = "limegreen";
    risk.innerText = "🟢 SECURE";
  }
}

/* THREAT STREAM */
const threats = [
  "Phishing attack detected",
  "OTP spoofing attempt blocked",
  "Suspicious login anomaly",
  "Malware signature found",
  "Fake API request intercepted"
];

function addLog(text) {
  const log = document.getElementById("log");
  const div = document.createElement("div");
  div.innerText = "🚨 " + text;
  log.prepend(div);
}

/* AUTO STREAM */
setInterval(() => {
  addLog(threats[Math.floor(Math.random() * threats.length)]);
}, 2000);

/* ALERT */
function triggerAlert(msg) {
  addLog("CRITICAL: " + msg);
}

/* NETWORK VISUAL */
const network = document.getElementById("network");

/* CREATE NODES */
for (let i = 0; i < 12; i++) {
  const node = document.createElement("div");
  node.className = "node";
  node.style.top = Math.random() * 280 + "px";
  node.style.left = Math.random() * 400 + "px";
  network.appendChild(node);
}

/* ATTACK LINES */
setInterval(() => {
  const line = document.createElement("div");
  line.className = "line";
  line.style.top = Math.random() * 300 + "px";
  line.style.left = "0px";

  network.appendChild(line);

  setTimeout(() => line.remove(), 2000);
}, 1500);

</script>

</body>
</html>
