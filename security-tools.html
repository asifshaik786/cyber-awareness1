<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cyber Security QA Engine</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  background: radial-gradient(circle at top, #0b1220, #05070f);
  color: #e5e7eb;
  font-family: "Inter", sans-serif;
}

/* HEADER */
header {
  text-align: center;
  padding: 25px;
}

header h1 {
  color: #38bdf8;
  font-size: 26px;
}

header p {
  color: #94a3b8;
  font-size: 13px;
}

/* LAYOUT */
.container {
  width: 92%;
  max-width: 1100px;
  margin: auto;
  display: grid;
  gap: 18px;
}

/* PANEL */
.panel {
  background: rgba(15, 23, 42, 0.65);
  border: 1px solid rgba(56, 189, 248, 0.15);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 18px;
}

/* TITLE */
.title {
  color: #facc15;
  font-size: 13px;
  margin-bottom: 10px;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  background: #0b1220;
  color: white;
}

/* GAUGE */
.bar {
  width: 100%;
  height: 14px;
  background: #111827;
  border-radius: 50px;
  overflow: hidden;
  margin-top: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  transition: 0.4s;
  background: red;
}

/* STREAM */
.stream {
  height: 180px;
  overflow-y: auto;
  font-size: 13px;
}

.msg {
  padding: 8px;
  margin-bottom: 6px;
  border-left: 3px solid #ef4444;
  background: rgba(239,68,68,0.07);
}

/* TERMINAL */
.terminal {
  font-family: monospace;
  font-size: 12px;
  background: #05070f;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  height: 140px;
  overflow-y: auto;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #38bdf8, #0ea5e9);
  color: black;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>🛡 Cyber Security QA Engine</h1>
  <p>Entropy Analysis • Live Threat Stream • QA Diagnostics</p>
</header>

<div class="container">

<!-- 🔐 PASSWORD ENTROPY -->
<div class="panel">
  <div class="title">🔐 PASSWORD ENTROPY ENGINE</div>

  <!-- FIXED: password hidden properly -->
  <input id="pwd" type="password" oninput="entropy()" placeholder="Enter secure key">

  <div class="bar">
    <div id="fill" class="fill"></div>
  </div>

  <p id="score">Entropy: N/A</p>
</div>

<!-- ⚠ LIVE SCAM STREAM -->
<div class="panel">
  <div class="title">⚠ LIVE SCAM INTELLIGENCE STREAM</div>

  <button onclick="addThreat()">Inject Threat Signal</button>

  <div class="stream" id="stream">
    <div class="msg">System online — monitoring cyber threats...</div>
  </div>
</div>

<!-- 🧪 QA SYSTEM -->
<div class="panel">
  <div class="title">🧪 MOBILE & BROWSER QA ENGINE</div>

  <button onclick="runQA()">Run System Check</button>
  <div class="terminal" id="qa">> Awaiting scan...</div>
</div>

</div>

<script>

/* PASSWORD ENTROPY */
function entropy() {
  const p = document.getElementById("pwd").value;
  const fill = document.getElementById("fill");
  const score = document.getElementById("score");

  let s = 0;
  if (p.length > 4) s += 20;
  if (p.length > 8) s += 20;
  if (/[A-Z]/.test(p)) s += 20;
  if (/[0-9]/.test(p)) s += 20;
  if (/[^A-Za-z0-9]/.test(p)) s += 20;

  fill.style.width = s + "%";

  if (s < 40) {
    fill.style.background = "#ef4444";
    score.innerText = "Entropy: LOW SECURITY";
  } else if (s < 80) {
    fill.style.background = "#facc15";
    score.innerText = "Entropy: MEDIUM SECURITY";
  } else {
    fill.style.background = "#22c55e";
    score.innerText = "Entropy: HIGH SECURITY";
  }
}

/* LIVE SCAM STREAM */
const threats = [
  "Phishing link detected in SMS gateway",
  "Fake banking OTP request intercepted",
  "Suspicious login pattern detected",
  "Malware URL blocked at DNS level",
  "Fraud call pattern flagged in network"
];

function addThreat() {
  const stream = document.getElementById("stream");

  const msg = document.createElement("div");
  msg.className = "msg";
  msg.innerText = "🚨 " + threats[Math.floor(Math.random() * threats.length)];

  stream.prepend(msg);
}

/* QA SYSTEM */
function runQA() {
  const qa = document.getElementById("qa");

  const logs = [
    "> Checking viewport responsiveness... OK",
    "> Testing touch input layers... OK",
    "> Browser rendering engine stable... OK",
    "> CSS compatibility verified... STABLE",
    "> Mobile score: 94/100",
    "> Security headers: PASSED"
  ];

  qa.innerHTML = "";

  let i = 0;
  const interval = setInterval(() => {
    if (i >= logs.length) {
      clearInterval(interval);
      return;
    }

    const line = document.createElement("div");
    line.innerText = logs[i];
    qa.appendChild(line);

    i++;
  }, 400);
}

</script>

</body>
</html>
