<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Safety Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: #fff;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #38bdf8;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

h2 {
  margin-bottom: 10px;
  color: #facc15;
}

p {
  margin-bottom: 15px;
  color: #cbd5e1;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #0ea5e9;
}

.result {
  margin-top: 10px;
  font-weight: bold;
}

.safe {
  color: #22c55e;
}

.danger {
  color: #ef4444;
}

.medium {
  color: #f59e0b;
}
</style>
</head>

<body>

<h1>🛡 Cyber Safety Interactive Dashboard</h1>

<div class="container">

  <!-- Quiz -->
  <div class="card">
    <h2>🎯 Cyber Safety Quiz</h2>
    <p>Should you share your OTP with a bank caller?</p>
    <button onclick="quizAnswer(false)">No</button>
    <button onclick="quizAnswer(true)">Yes</button>
    <div id="quizResult" class="result"></div>
  </div>

  <!-- Threat Monitor -->
  <div class="card">
    <h2>⚠ Threat Level Monitor</h2>
    <p>Check current system safety level</p>
    <button onclick="checkThreat()">Check Threat Level</button>
    <div id="threatResult" class="result"></div>
  </div>

  <!-- Password Generator -->
  <div class="card">
    <h2>🔐 Password Generator</h2>
    <p>Create a strong secure password</p>
    <button onclick="generatePassword()">Generate Password</button>
    <div id="passwordResult" class="result"></div>
  </div>

</div>

<script>
// Quiz
function quizAnswer(isYes) {
  const result = document.getElementById("quizResult");

  if (isYes) {
    result.innerHTML = "❌ Wrong! Never share OTP with anyone.";
    result.className = "result danger";
  } else {
    result.innerHTML = "✅ Correct! OTP should never be shared.";
    result.className = "result safe";
  }
}

// Threat Level
function checkThreat() {
  const result = document.getElementById("threatResult");
  const levels = ["Low 🟢", "Medium 🟡", "High 🔴"];
  const index = Math.floor(Math.random() * levels.length);

  let className = "result safe";
  if (index === 1) className = "result medium";
  if (index === 2) className = "result danger";

  result.innerHTML = "Current Threat Level: " + levels[index];
  result.className = className;
}

// Password Generator
function generatePassword() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$!";
  let password = "";

  for (let i = 0; i < 10; i++) {
    password += chars.charAt(Math.floor(Math.random() * chars.length));
  }

  const result = document.getElementById("passwordResult");
  result.innerHTML = "Generated Password: <br><b>" + password + "</b>";
  result.className = "result safe";
}
</script>

</body>
</html>
