<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOC Cyber Security Engine</title>

<style>
body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: #05070f;
  color: #e5e7eb;
  overflow-x: hidden;
}

/* RADAR BACKGROUND */
.radar {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  border: 2px solid rgba(56,189,248,0.2);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: spin 8s linear infinite;
  z-index: 0;
}

.radar::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 1px solid rgba(56,189,248,0.1);
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  position: relative;
  z-index: 2;
}

header h1 {
  color: #38bdf8;
}

/* GRID */
.container {
  width: 92%;
  max-width: 1100px;
  margin: auto;
  display: grid;
  gap: 18px;
  position: relative;
  z-index: 2;
}

/* PANEL */
.panel {
  background: rgba(15, 23, 42, 0.7);
  border: 1px solid rgba(56,189,248,0.2);
  padding: 16px;
  border-radius: 14px;
  backdrop-filter: blur(10px);
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  background: #0b1220;
  border: 1px solid #1f2937;
  color: white;
}

/* ENTROPY BAR */
.bar {
  height: 12px;
  background: #111827;
  border-radius: 50px;
  overflow: hidden;
  margin-top: 8px;
}

.fill {
  height: 100%;
  width: 0%;
  transition: 0.5s;
}

/* STREAM */
.stream {
  height: 180px;
  overflow-y: auto;
  font-size: 13px;
}

.msg {
  padding: 6px;
  border-left: 3px solid #ef4444;
  margin-bottom: 5px;
  background: rgba(255,0,0,0.05);
}

/* TERMINAL */
.terminal {
  font-family: monospace;
  font-size: 12px;
  background: #05070f;
  padding: 10px;
  height: 140px;
  overflow-y: auto;
  border: 1px solid #1f2937;
  border-radius: 10px;
}

/* BUTTON */
button {
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* RISK LABEL */
.risk {
  margin-top: 6px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="radar"></div>

<header>
  <h1>🛡 SOC Cyber Security Engine</h1>
  <p>Real-Time Threat Intelligence • QA Diagnostics • Entropy Analysis</p>
</header>

<div class="container">

<!-- PASSWORD -->
<div class="panel">
  🔐 Password Entropy Engine
  <input id="pwd" type="password" oninput="entropy()">
  <div class="bar"><div id="fill" class="fill"></div></div>
  <div id="riskLabel" class="risk">Status: Idle</div>
</div>

<!-- SCAM STREAM -->
<div class="panel">
  ⚠ Live Threat Stream
  <button onclick="startStream()">Start Feed</button>
  <div class="stream" id="stream"></div>
</div>

<!-- QA -->
<div class="panel">
  🧪 System Diagnostics
  <button onclick="runQA()">Run Scan</button>
  <div class="terminal" id="qa">> Ready...</div>
</div>

</div>

<script>

/* ENTROPY ENGINE */
function entropy() {
  const p = document.getElementById("pwd").value;
  const fill = document.getElementById("fill");
  const risk = document.getElementById("riskLabel");

  let s = 0;
  if (p.length > 4) s += 20;
  if (p.length > 8) s += 20;
  if (/[A-Z]/.test(p)) s += 20;
  if (/[0-9]/.test(p)) s += 20;
  if (/[^A-Za-z0-9]/.test(p)) s += 20;

  fill.style.width = s + "%";

  if (s < 40) {
    fill.style.background = "red";
    risk.innerText = "Risk: HIGH";
    risk.style.color = "red";
  } else if (s < 80) {
    fill.style.background = "orange";
    risk.innerText = "Risk: MEDIUM";
    risk.style.color = "orange";
  } else {
    fill.style.background = "limegreen";
    risk.innerText = "Risk: LOW";
    risk.style.color = "limegreen";
  }
}

/* LIVE AUTO STREAM */
const threats = [
  "Phishing attack detected",
  "OTP fraud attempt blocked",
  "Suspicious login pattern",
  "Malware domain blocked",
  "Fake banking SMS detected"
];

function startStream() {
  const stream = document.getElementById("stream");

  setInterval(() => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = "🚨 " + threats[Math.floor(Math.random()*threats.length)];
    stream.prepend(div);
  }, 1500);
}

/* QA SCAN */
function runQA() {
  const qa = document.getElementById("qa");

  const logs = [
    "Scanning system modules...",
    "Checking browser security...",
    "Analyzing CSS integrity...",
    "Testing mobile compatibility...",
    "Threat engine: ACTIVE",
    "System status: SECURE"
  ];

  qa.innerHTML = "";

  let i = 0;
  const interval = setInterval(() => {
    if (i >= logs.length) return clearInterval(interval);
    qa.innerHTML += logs[i] + "<br>";
    i++;
  }, 500);
}

</script>

</body>
</html>
