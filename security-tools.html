<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Security Diagnostics Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #0b1220;
  color: #e2e8f0;
  padding: 20px;
}

header {
  text-align: center;
  margin-bottom: 25px;
}

header h1 {
  color: #38bdf8;
  font-size: 28px;
}

header p {
  color: #94a3b8;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: #111827;
  border-radius: 15px;
  padding: 18px;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

/* HEADINGS */
.card h2 {
  font-size: 18px;
  margin-bottom: 12px;
  color: #facc15;
}

/* PASSWORD GAUGE */
.gauge {
  width: 100%;
  height: 18px;
  background: #1f2937;
  border-radius: 50px;
  overflow: hidden;
  margin-top: 10px;
}

.fill {
  height: 100%;
  width: 0%;
  background: red;
  transition: 0.5s;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 12px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #0ea5e9;
}

/* ALERT FEED */
.alert-box {
  height: 180px;
  overflow-y: auto;
  background: #0f172a;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}

.alert {
  padding: 8px;
  margin-bottom: 6px;
  border-left: 4px solid red;
  background: rgba(255,0,0,0.08);
}

/* STATUS */
.status {
  font-weight: bold;
  margin-top: 8px;
}

.low { color: #22c55e; }
.medium { color: #facc15; }
.high { color: #ef4444; }
</style>
</head>

<body>

<header>
  <h1>🛡 Security Diagnostics & QA Dashboard</h1>
  <p>Real-time Cyber Monitoring System</p>
</header>

<div class="grid">

  <!-- PASSWORD ENTROPY -->
  <div class="card">
    <h2>🔐 Password Entropy Gauge</h2>
    <p>Enter Password:</p>
    <input id="password" type="text" oninput="checkStrength()" style="width:100%; padding:8px; border-radius:6px; border:none; margin-top:5px;">
    
    <div class="gauge">
      <div id="fill" class="fill"></div>
    </div>

    <div id="strengthText" class="status">Strength: N/A</div>
  </div>

  <!-- SCAM ALERT SYSTEM -->
  <div class="card">
    <h2>⚠ Live Scam Alert System</h2>
    <button onclick="generateAlert()">Generate Alert</button>

    <div class="alert-box" id="alertBox">
      <div class="alert">System initialized... monitoring threats.</div>
    </div>
  </div>

  <!-- SECURITY DIAGNOSTICS -->
  <div class="card">
    <h2>🧪 Security Diagnostics</h2>
    <button onclick="runDiagnostics()">Run Diagnostics</button>

    <div id="diagResult" style="margin-top:10px;"></div>
  </div>

</div>

<script>

/* PASSWORD STRENGTH */
function checkStrength() {
  const pass = document.getElementById("password").value;
  const fill = document.getElementById("fill");
  const text = document.getElementById("strengthText");

  let score = 0;

  if (pass.length > 5) score += 20;
  if (pass.length > 8) score += 20;
  if (/[A-Z]/.test(pass)) score += 20;
  if (/[0-9]/.test(pass)) score += 20;
  if (/[@$!%*?&]/.test(pass)) score += 20;

  fill.style.width = score + "%";

  if (score <= 40) {
    fill.style.background = "red";
    text.innerHTML = "Strength: Weak";
    text.className = "status high";
  } else if (score <= 80) {
    fill.style.background = "orange";
    text.innerHTML = "Strength: Medium";
    text.className = "status medium";
  } else {
    fill.style.background = "limegreen";
    text.innerHTML = "Strength: Strong";
    text.className = "status low";
  }
}

/* SCAM ALERT SYSTEM */
const alerts = [
  "Suspicious OTP request detected from unknown source!",
  "Fake banking SMS link flagged by AI filter!",
  "Phishing email detected with malicious attachment!",
  "Unusual login attempt blocked successfully!",
  "Fraud call pattern identified (bank impersonation)."
];

function generateAlert() {
  const box = document.getElementById("alertBox");
  const msg = alerts[Math.floor(Math.random() * alerts.length)];

  const div = document.createElement("div");
  div.className = "alert";
  div.innerText = "🚨 " + msg;

  box.prepend(div);
}

/* DIAGNOSTICS */
function runDiagnostics() {
  const result = document.getElementById("diagResult");

  const checks = [
    "Firewall Status: ACTIVE 🟢",
    "Antivirus Engine: UPDATED 🟢",
    "Network Scan: SAFE 🟢",
    "Phishing Filter: ENABLED 🟢"
  ];

  let html = "<ul>";
  checks.forEach(c => html += "<li>" + c + "</li>");
  html += "</ul>";

  result.innerHTML = html;
}

</script>

</body>
</html>
